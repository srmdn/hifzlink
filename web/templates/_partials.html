{{define "head"}}
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
{{end}}

{{define "topbar"}}
<header class="topbar">
  <div class="container topbar-inner">
    <a class="brand" href="{{.HomeURL}}">
      <span class="brand-main">HifzLink</span>
      <span class="brand-sub">Quran Murojaah</span>
    </a>
    <nav class="lang-toggle" aria-label="Language mode">
      <a class="{{if eq .Lang "ar"}}active{{end}}" href="{{.LangARURL}}">AR</a>
      <a class="{{if eq .Lang "en"}}active{{end}}" href="{{.LangENURL}}">AR + EN</a>
      <a class="{{if eq .Lang "id"}}active{{end}}" href="{{.LangIDURL}}">AR + ID</a>
    </nav>
  </div>
</header>
{{end}}

{{define "footer"}}
<footer class="footer">
  <div class="container footer-inner">
    <span>Quran text sourced from Tanzil</span>
    <span>·</span>
    <a href="https://github.com/srmdn/hifzlink" rel="noopener noreferrer" target="_blank">Open source</a>
  </div>
</footer>
{{end}}
