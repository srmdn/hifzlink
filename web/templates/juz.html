<!doctype html>
<html lang="en">
{{template "head" .}}
<body>
{{template "topbar" .}}

  <main class="container">
    <p class="back"><a href="{{.HomeURL}}">Home</a></p>
    <h1>Juz {{.Juz}} — Similar Verse Pairs</h1>

    <section class="card">
      {{if .Pairs}}
      <ul class="pairs-list">
        {{range .Pairs}}
        <li class="pair-item">
          <div class="line-head">
            <span class="pair-refs">{{.Ayah1}} <span class="meta">↔</span> {{.Ayah2}}</span>
            <a class="button-link" href="/compare?ayah1={{.Ayah1}}&ayah2={{.Ayah2}}&lang={{$.Lang}}">Compare</a>
          </div>
          {{if .Note}}<p class="meta note">{{.Note}}</p>{{end}}
        </li>
        {{end}}
      </ul>
      {{else}}
      <p class="meta">No relations in this juz yet.</p>
      {{end}}
    </section>
  </main>

{{template "footer" .}}
</body>
</html>
