<!doctype html>
<html lang="en">
{{template "head" .}}
<body>
{{template "topbar" .}}

  <main class="container">
    <p class="back"><a href="{{.HomeURL}}">← Back</a></p>
    <div class="card not-found-card">
      <p class="eyebrow">Not found</p>
      <h1>{{.Heading}}</h1>
      <p class="lead">{{.Message}}</p>
      <a class="btn-sm" href="{{.SearchURL}}">Search another ayah</a>
    </div>
  </main>

{{template "footer" .}}
</body>
</html>
