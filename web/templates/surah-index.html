<!doctype html>
<html lang="en">
{{template "head" .}}
<link rel="stylesheet" href="/static/surah-index.css">
<body>
{{template "topbar" .}}

  <main class="surah-index-page">
    <h1>Browse by Surah</h1>
    <p class="meta">114 surahs. Surahs with mutashabihat pairs are highlighted.</p>

    <div class="surah-filter-bar">
      <div class="surah-filter-field">
        <label for="surah-filter" class="surah-filter-label">Filter</label>
        <input id="surah-filter" class="surah-filter-input" type="search" placeholder="Name or number..." autocomplete="off">
      </div>
      <div class="surah-index-stats">
        <p><strong id="surah-stat-shown">114</strong> shown</p>
        <p id="surah-stat-pairs"></p>
      </div>
    </div>

    <div class="surah-index-list" id="surah-index-list">
      {{range .Surahs}}
      <a class="surah-index-row{{if gt .RelationCount 0}} has-pairs{{end}}" href="/surah/{{.Number}}?lang={{$.Lang}}">
        <span class="surah-index-num">{{.Number}}</span>
        <span class="surah-index-name">{{.Name}}</span>
        {{if gt .RelationCount 0}}
        <span class="surah-index-badge">{{.RelationCount}}</span>
        {{else}}
        <span class="surah-index-empty">0 pairs</span>
        {{end}}
      </a>
      {{end}}
    </div>
  </main>

  <script>
  (() => {
    const input = document.getElementById('surah-filter');
    const list = document.getElementById('surah-index-list');
    const statShown = document.getElementById('surah-stat-shown');
    const statPairs = document.getElementById('surah-stat-pairs');
    const rows = Array.from(list.querySelectorAll('.surah-index-row'));
    const withPairs = rows.filter(r => r.classList.contains('has-pairs')).length;
    statPairs.textContent = withPairs + ' with pairs';
    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      let shown = 0;
      rows.forEach(row => {
        const name = row.querySelector('.surah-index-name').textContent.toLowerCase();
        const num = row.querySelector('.surah-index-num').textContent.trim();
        const match = !q || name.includes(q) || num.startsWith(q);
        row.hidden = !match;
        if (match) shown++;
      });
      statShown.textContent = shown;
    });
  })();
  </script>

{{template "footer" .}}
</body>
</html>
